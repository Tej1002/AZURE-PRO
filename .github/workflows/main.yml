name: Deploy AKS and Install ArgoCD

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest


env:
  TF_VAR_ssh_public_key: ${{ secrets.TF_VAR_SSH_PUBLIC_KEY }}
  TF_VAR_client_id: ${{ secrets.TF_VAR_CLIENT_ID }}
  TF_VAR_client_secret: ${{ secrets.TF_VAR_CLIENT_SECRET }}
  TF_VAR_tenant_id: ${{ secrets.TF_VAR_TENANT_ID }}
  TF_VAR_subscription_id: ${{ secrets.TF_VAR_SUBSCRIPTION_ID }}

  ARM_CLIENT_ID: ${{ secrets.TF_VAR_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.TF_VAR_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.TF_VAR_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.TF_VAR_SUBSCRIPTION_ID }}

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: |
        {
          "clientId":"${{ secrets.TF_VAR_CLIENT_ID }}",
          "clientSecret":"${{ secrets.TF_VAR_CLIENT_SECRET }}",
          "subscriptionId":"${{ secrets.TF_VAR_SUBSCRIPTION_ID }}",
          "tenantId":"${{ secrets.TF_VAR_TENANT_ID }}"
        }

  - name: Terraform Init
    working-directory: ./AZURE-PRO/AKS
    run: terraform init

  - name: Terraform Validate
    working-directory: ./AZURE-PRO/AKS
    run: terraform validate

  - name: Terraform Plan
    working-directory: ./AZURE-PRO/AKS
    run: terraform plan

  - name: Terraform Apply
    working-directory: ./AZURE-PRO/AKS
    run: terraform apply -auto-approve

  - name: Install kubectl
    uses: azure/setup-kubectl@v4

  - name: Install Helm
    uses: azure/setup-helm@v4

  - name: Get AKS Credentials
    run: |
      az aks get-credentials \
        --resource-group rg-aks-demo \
        --name aks-cluster \
        --overwrite-existing

  - name: Verify Cluster
    run: |
      kubectl get nodes

  - name: Add ArgoCD Helm Repository
    run: |
      helm repo add argo https://argoproj.github.io/argo-helm
      helm repo update

  - name: Create ArgoCD Namespace
    run: |
      kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

  - name: Install ArgoCD
    run: |
      helm upgrade --install argocd argo/argo-cd \
        --namespace argocd \
        --set server.service.type=LoadBalancer \
        --wait

  - name: Wait For ArgoCD
    run: |
      kubectl rollout status deployment/argocd-server -n argocd --timeout=300s

  - name: Verify ArgoCD Installation
    run: |
      kubectl get pods -n argocd
      kubectl get svc -n argocd

  - name: Get ArgoCD Admin Password
    run: |
      kubectl -n argocd get secret argocd-initial-admin-secret \
        -o jsonpath="{.data.password}" | base64 -d
      echo

  - name: Get ArgoCD Service
    run: |
      kubectl get svc argocd-server -n argocd

